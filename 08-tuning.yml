---
- name: VFX Workstation Tuning
  hosts: localhost
  connection: local
  become: true

  tasks:
    - name: Install tuned
      dnf:
        name: tuned
        state: present

    - name: Enable and start tuned service
      ansible.builtin.service:
        name: tuned
        enabled: yes
        state: started

    - name: Set tuned profile to latency-performance
      ansible.builtin.command:
        cmd: tuned-adm profile latency-performance
      register: _tuned_result
      changed_when: "'Switched' in _tuned_result.stdout"
      failed_when: _tuned_result.rc != 0

    - name: Set vm.swappiness for large scene caches
      ansible.posix.sysctl:
        name: vm.swappiness
        value: '10'
        state: present
        reload: yes

    - name: Set vm.dirty_ratio for large file writes (cache renders)
      ansible.posix.sysctl:
        name: vm.dirty_ratio
        value: '60'
        state: present
        reload: yes

    - name: Set vm.dirty_background_ratio
      ansible.posix.sysctl:
        name: vm.dirty_background_ratio
        value: '5'
        state: present
        reload: yes

    - name: Set vm.min_free_kbytes for headroom
      ansible.posix.sysctl:
        name: vm.min_free_kbytes
        value: '262144'
        state: present
        reload: yes

    - name: Set vm.max_map_count for VFX applications
      ansible.posix.sysctl:
        name: vm.max_map_count
        value: '1048576'
        state: present
        reload: yes

    - name: Set fs.file-max
      ansible.posix.sysctl:
        name: fs.file-max
        value: '1048576'
        state: present
        reload: yes

    - name: Set net.core.rmem_max for NFS performance
      ansible.posix.sysctl:
        name: net.core.rmem_max
        value: '134217728'
        state: present
        reload: yes

    - name: Set net.core.wmem_max for NFS performance
      ansible.posix.sysctl:
        name: net.core.wmem_max
        value: '134217728'
        state: present
        reload: yes

    - name: Set net.core.netdev_max_backlog
      ansible.posix.sysctl:
        name: net.core.netdev_max_backlog
        value: '300000'
        state: present
        reload: yes

    - name: Set kernel core dump pattern
      ansible.posix.sysctl:
        name: kernel.core_pattern
        value: '/var/crash/core.%e.%p'
        state: present
        reload: yes

    - name: Deploy VFX system limits
      ansible.builtin.copy:
        dest: /etc/security/limits.d/vfx.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          * soft nofile 65536
          * hard nofile 65536
          * soft nproc 65536
          * hard nproc 65536
          * soft stack unlimited
          * hard stack unlimited
          * soft memlock unlimited
          * hard memlock unlimited
