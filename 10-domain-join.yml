---
- name: Join AD Domain
  hosts: localhost
  connection: local
  become: true
  vars:
    realm_name: "alongsidegroup.com"
    realm_user: "{{ lookup('env', 'REALM_USER') | default('Administrator', true) }}"
    realm_workgroup: "ALONGSIDE"
    join_sssd: true
    enable_mkhomedir: true
    realm_password: "{{ lookup('env', 'REALM_PASSWORD') }}"

  tasks:
    - name: Prompt for AD domain password
      ansible.builtin.pause:
        prompt: "Enter AD password for {{ realm_user }}"
        echo: no
      no_log: true
      when: realm_password is not defined or realm_password | length == 0
      register: _pw_result
      changed_when: false

    - name: Set password from prompt
      ansible.builtin.set_fact:
        realm_password: "{{ _pw_result.input }}"
      when: _pw_result is defined and _pw_result.input
      no_log: yes

    - name: Join AD domain
      community.general.realm:
        name: "{{ realm_name }}"
        user: "{{ realm_user }}"
        password: "{{ realm_password }}"
        state: present
        assume_positive: yes
        assume_resolve: yes
        workgroup: "{{ realm_workgroup }}"
      no_log: yes

    - name: Ensure SSSD is enabled and started
      ansible.builtin.service:
        name: sssd
        enabled: yes
        state: started

    - name: Ensure oddjobd is enabled and started
      ansible.builtin.service:
        name: oddjobd
        enabled: yes
        state: started

    - name: Ensure oddjob-mkhomedir service is enabled
      ansible.builtin.service:
        name: oddjob-mkhomedir
        enabled: yes
