---
- name: Setup Machines
  hosts: localhost
  connection: local
  become: true
  vars:
    rez_version: "3.4.0"
    rez_dir: /opt/rez
    rez_cache_dir: "{{ rez_dir }}/package_cache"
    rez_python_version: "python3.11"
    rez_group: Domain_Artists
    rez_download_url: "https://github.com/AcademySoftwareFoundation/rez/releases/download/{{ rez_version }}/{{ rez_version }}.tar.gz"
    rez_download_dir: /tmp
    crb_powertools: "{{ 'powertools' if ansible_distribution_major_version == '8' else 'crb' }}"

  tasks:
    #DOT FILES
    #------------
    - name: ENV Variables
      copy:
        src: Files/profile
        dest: /etc/profile
        owner: root
        group: root

    - name: set default user creation bash
      copy:
        src: Files/bash_profile
        dest: /etc/skel/.bash_profile
        owner: root
        group: root

    - name: system wide umask
      copy:
        src: Files/umask.sh
        dest: /etc/profile.d/umask.sh
        owner: root
        group: root

    - name: copy over rez.sh
      copy: 
        src: Files/rez.sh
        dest: /etc/profile.d/rez.sh
        owner: root
        group: root

    #REPO/KERNEL
    #------------
    - name: Ensure the powertools repository is enabled
      community.general.dnf_config_manager:
        name: "{{  crb_powertools  }}"
        state: enabled

    - name: Ensure the epel repository is enabled
      community.general.dnf_config_manager:
        name: epel
        state: enabled

    - name: Elrepo GPG KEY
      ansible.builtin.rpm_key:
        state: present
        key: https://www.elrepo.org/RPM-GPG-KEY-elrepo.org

    - name: Elrepo GPG KEY V2
      ansible.builtin.rpm_key:
        state: present
        key: https://www.elrepo.org/RPM-GPG-KEY-v2-elrepo.org

    - name: Nvida Repo
      ansible.builtin.yum_repository:
        name: cuda-rhel{{ ansible_distribution_major_version }}-x86_64
        description: cuda-rhel{{ ansible_distribution_major_version }}-x86_64
        file: cuda-rhel{{ ansible_distribution_major_version }}
        baseurl: 'https://developer.download.nvidia.com/compute/cuda/repos/rhel{{ ansible_distribution_major_version }}/x86_64'
        gpgkey: 'https://developer.download.nvidia.com/compute/cuda/repos/rhel{{ ansible_distribution_major_version }}/x86_64/D42D0685.pub'
        enabled: true
        gpgcheck: true

    #NVIDIA DRIVERS
    #------------
    - name: enable 580 drivers 2
      dnf:
        name: '@nvidia-driver:580-open'
        state: present
        
    - name: install 580 drivers
      dnf:
        name: nvidia-open

    #ELREPO KERNEL MT
    #------------
    - name: Elrepo
      dnf:
        name: 'https://www.elrepo.org/elrepo-release-{{ ansible_distribution_major_version }}.el{{ ansible_distribution_major_version }}.elrepo.noarch.rpm'
        state: present

    - name: install Kernel-ml
      dnf:
        enablerepo: elrepo-kernel
        name:
          - kernel-ml
          - kernel-ml-devel

    #INSTALL KDE
    #------------
    - name: install KDE
      dnf:
        name:
          - '@KDE Plasma Workspaces'
          - '@base-x'

    - name: graphical target
      shell: sudo systemctl set-default graphical.target

    #PROGRAM DEPENDENCIES
    #------------
    - name: general dependencies
      dnf:
        name:
          - bash
          - curl
          - dbus
          - perl
          - git
          - less
          - zsh
          - python3.11
          - htop
          - btop
          - firefox
          - ark
          - flatpak
          - gdb
          - cifs-utils
          - nfs-utils
          - rasdaemon
          - liberation-fonts
          - google-noto-fonts-common
          - google-noto-sans-fonts
          - dejavu-fonts-all

    - name: install houdini dependencies
      dnf:
        name:
          - alsa-lib
          - cups-libs
          - dbus-libs
          - expat
          - fontconfig
          - glib2
          - glibc
          - libcurl
          - libdrm
          - libgcc
          - libglvnd-egl
          - libglvnd-glx
          - libglvnd-opengl
          - libICE
          - libSM
          - libstdc++
          - libuuid
          - libX11
          - libX11-xcb
          - libxcb
          - libXcomposite
          - libXdamage
          - libXext
          - libXfixes
          - libXi
          - libxkbcommon
          - libxkbcommon-x11
          - libxkbfile
          - libXrandr
          - libXrender
          - libxshmfence
          - libXt
          - libXtst
          - mesa-libGLU
          - ncurses-libs
          - nspr
          - nss
          - nss-util
          - nxagent
          - pciutils-libs
          - xcb-util-cursor
          - xcb-util-image
          - xcb-util-keysyms
          - xcb-util-renderutil
          - xcb-util-wm
        state: present

    - name: Install Cockpit & Dependencies
      dnf:
        name:
          - cockpit
          - cockpit-storaged
          - cockpit-shell
          - samba-common-tools
          - adcli
          - sssd
          - realmd
          - oddjob
          - oddjob-mkhomedir
          - krb5-workstation
        state: present

    - name: Enable Cockpit on launch
      ansible.builtin.service:
        name: cockpit.socket
        enabled: yes
        state: started
    
    - name: disable mcelog
      ansible.builtin.service:
        name: mcelog.service
        enabled: no
        state: stopped

    - name: Enable rasdaemon
      ansible.builtin.service:
        name: rasdaemon.service
        enabled: yes
        state: started

    #REZ SETUP
    #------------
    - name: Download Rez release archive
      ansible.builtin.get_url:
        url: "{{ rez_download_url }}"
        dest: "{{ rez_download_dir }}/{{ rez_version }}.tar.gz"
        mode: "0644"
      register: rez_download

    - name: Extract Rez archive
      ansible.builtin.unarchive:
        src: "{{ rez_download_dir }}/{{ rez_version }}.tar.gz"
        dest: "{{ rez_download_dir }}"
        remote_src: yes
      register: rez_extract

    - name: Install rez using install.py
      ansible.builtin.command:
        cmd: "{{ rez_python_version }} {{ rez_download_dir }}/rez-{{ rez_version }}/install.py {{ rez_dir }}"
      register: rez_install
      changed_when: rez_install.rc == 0

    - name: Remove extracted archive
      ansible.builtin.file:
        path: "{{ rez_download_dir }}/rez-{{ rez_version }}"
        state: absent

    - name: Remove downloaded archive
      ansible.builtin.file:
        path: "{{ rez_download_dir }}/{{ rez_version }}.tar.gz"
        state: absent     

    - name: Create package cache directory with SGID
      ansible.builtin.file:
        path: "{{ rez_cache_dir }}"
        state: directory
        #group: "{{ rez_group }}"
        mode: "2777"

    - name: Install rez-pip plugin
      ansible.builtin.command:
        cmd: "{{ rez_dir }}/bin/python -m pip install rez-pip"

    #SELINUX SETUP
    #------------
    - name: Install SELinux Python bindings
      dnf:
        name:
          - python3-libselinux
          - python3-libsemanage
        state: present

    - name: Set SELinux to permissive
      ansible.posix.selinux:
        policy: targeted
        state: permissive

    #SETUP NFS
    #------------
    - name: Create ASLON mount point
      ansible.builtin.file:
        path: /mnt/aslon
        state: directory
        owner: root
        group: root
        mode: '0755'
 
    - name: Mount ASLON NFS share
      ansible.posix.mount:
        path: /mnt/aslon
        src: synology.alongsidegroup.com:/volume1/ASLON
        fstype: nfs
        # sec=sys used until UID/GID mapping between AD and Synology is resolved
        # To switch to Kerberos once resolved, change sec=sys to sec=krb5p
        opts: sec=sys,vers=4,rsize=1048576,wsize=1048576,_netdev,nofail,auto
        state: mounted

    # TUNED
    #------------
    - name: Install tuned
      dnf:
        name: tuned
        state: present
 
    - name: Enable and start tuned
      ansible.builtin.service:
        name: tuned
        enabled: yes
        state: started
 
    - name: Set tuned profile to balanced for workstations
      ansible.builtin.command:
        cmd: tuned-adm profile balanced
      changed_when: false

    # SYSCTL TUNING
    #------------
    - name: Set vm.max_map_count for VFX applications
      ansible.posix.sysctl:
        name: vm.max_map_count
        value: '1048576'
        state: present
        reload: yes
 
    - name: Set net.core.rmem_max for NFS performance
      ansible.posix.sysctl:
        name: net.core.rmem_max
        value: '134217728'
        state: present
        reload: yes
 
    - name: Set net.core.wmem_max for NFS performance
      ansible.posix.sysctl:
        name: net.core.wmem_max
        value: '134217728'
        state: present
        reload: yes
 
    - name: Set net.core.netdev_max_backlog
      ansible.posix.sysctl:
        name: net.core.netdev_max_backlog
        value: '300000'
        state: present
        reload: yes

    - name: Set kernel core dump pattern
      ansible.posix.sysctl:
        name: kernel.core_pattern
        value: '/var/crash/core.%e.%p'
        state: present
        reload: yes

    # SYSTEM LIMITS
    #------------
    - name: Set system limits for VFX applications
      ansible.builtin.copy:
        dest: /etc/security/limits.d/vfx.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          * soft nofile 65536
          * hard nofile 65536
          * soft nproc 65536
          * hard nproc 65536
          * soft stack unlimited
          * hard stack unlimited
