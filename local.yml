---
- name: Setup Machines
  hosts: localhost
  connection: local
  become: true
  vars:
    rez_version: "3.4.0"
    rez_dir: /opt/rez
    rez_cache_dir: "{{ rez_dir }}/package_cache"
    rez_python_version: "python3.11"
    rez_group: Domain_Artists
    rez_download_url: "https://github.com/AcademySoftwareFoundation/rez/releases/download/{{ rez_version }}/{{ rez_version }}.tar.gz"
    rez_download_dir: /tmp

  tasks:
    #DOT FILES
    #------------
    - name: ENV Variables
      copy:
        src: Files/profile
        dest: /etc/profile
        owner: root
        group: root

    #REPO/KERNEL
    #------------
    - name: Ensure the crb repository is enabled
      community.general.dnf_config_manager:
        name: powertools
        state: enabled

    - name: Ensure the epel repository is enabled
      community.general.dnf_config_manager:
        name: epel
        state: enabled

    - name: Elrepo
      dnf:
        name: 'https://www.elrepo.org/elrepo-release-8.el8.elrepo.noarch.rpm'
        state: present

    - name: install Kernel-ml
      dnf:
        enablerepo: elrepo-kernel
        name:
          - kernel-ml
          - kernel-ml-devel

    - name: Nvida Repo
      ansible.builtin.yum_repository:
        name: cuda-rhel8-x86_64
        description: cuda-rhel8-x86_64
        file: cuda-rhel8
        baseurl: 'https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64'
        gpgkey: 'https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/D42D0685.pub'
        enabled: true
        gpgcheck: true

    #NVIDIA DRIVERS
    #------------
    #- name: install nvidia drivers

    #INSTALL KDE
    #------------
    - name: install KDE
      dnf:
        name:
          - '@KDE Plasma Workspaces'
          - '@base-x'

    #PROGRAM DEPENDENCIES
    #------------
    - name: general dependencies
      dnf:
        name:
          - bash
          - curl
          - dbus
          - perl
          - git
          - less
          - zsh
          - python3.11
          - htop
          - btop
          - firefox
          - ark
          - flatpak
          - gdb
          - cifs-utils

    - name: install houdini dependencies
      dnf:
        name:
          - alsa-lib
          - cups-libs
          - dbus-libs
          - expat
          - fontconfig
          - glib2
          - glibc
          - libcurl
          - libdrm
          - libgcc
          - libglvnd-egl
          - libglvnd-glx
          - libglvnd-opengl
          - libICE
          - libSM
          - libstdc++
          - libuuid
          - libX11
          - libX11-xcb
          - libxcb
          - libXcomposite
          - libXdamage
          - libXext
          - libXfixes
          - libXi
          - libxkbcommon
          - libxkbcommon-x11
          - libxkbfile
          - libXrandr
          - libXrender
          - libxshmfence
          - libXt
          - libXtst
          - mesa-libGLU
          - ncurses-libs
          - nspr
          - nss
          - nss-util
          - nxagent
          - pciutils-libs
          - xcb-util-cursor
          - xcb-util-image
          - xcb-util-keysyms
          - xcb-util-renderutil
          - xcb-util-wm
        state: present

    - name: Install Cockpit & Dependencies
      dnf:
        name:
          - cockpit
          - cockpit-storaged
          - cockpit-shell
          - samba-common-tools
          - adcli
          - sssd
          - realmd
          - oddjob
          - oddjob-mkhomedir
          - krb5-workstation
        state: present

    - name: Enable Cockpit on launch
      ansible.builtin.service:
        name: cockpit.socket
        enabled: yes
        state: started

    - name: Download Rez release archive
      ansible.builtin.get_url:
        url: "{{ rez_download_url }}"
        dest: "{{ rez_download_dir }}/{{ rez_version }}.tar.gz"
        mode: "0644"
      register: rez_download

    - name: Extract Rez archive
      ansible.builtin.unarchive:
        src: "{{ rez_download_dir }}/{{ rez_version }}.tar.gz"
        dest: "{{ rez_download_dir }}"
        remote_src: yes
      register: rez_extract

    - name: Install rez using install.py
      ansible.builtin.command:
        cmd: "{{ rez_python_version }} {{ rez_download_dir }}/rez-{{ rez_version }}/install.py {{ rez_dir }}"
      register: rez_install
      changed_when: rez_install.rc == 0

    - name: Remove extracted archive
      ansible.builtin.file:
        path: "{{ rez_download_dir }}/rez-{{ rez_version }}"
        state: absent

    - name: Remove downloaded archive
      ansible.builtin.file:
        path: "{{ rez_download_dir }}/{{ rez_version }}.tar.gz"
        state: absent
      

    - name: Create package cache directory with SGID
      ansible.builtin.file:
        path: "{{ rez_cache_dir }}"
        state: directory
        #group: "{{ rez_group }}"
        mode: "2777"

    - name: Install rez-pip plugin
      ansible.builtin.pip:
        name: rez-pip
        virtualenv: "{{ rez_dir }}"
