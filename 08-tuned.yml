---
- name: Configure Performance Tuning
  hosts: localhost
  connection: local
  become: true

  tasks:
    - name: Install tuned
      dnf:
        name: tuned
        state: present

    - name: Enable and start tuned service
      ansible.builtin.service:
        name: tuned
        enabled: yes
        state: started

    - name: Set tuned profile to balanced
      ansible.builtin.command:
        cmd: tuned-adm profile balanced
      changed_when: false
